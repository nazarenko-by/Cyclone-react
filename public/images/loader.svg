<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Elegant circular loader -->
    <circle 
        cx="20" 
        cy="20" 
        r="16" 
        stroke="#f1dfdd" 
        stroke-width="3" 
        fill="none"
    />
    <circle 
        cx="20" 
        cy="20" 
        r="16" 
        stroke="#c7bbb9" 
        stroke-width="3" 
        fill="none"
        stroke-linecap="round"
        stroke-dasharray="80 20"
    >
        <animateTransform
        attributeName="transform"
        attributeType="XML"
        type="rotate"
        from="0 20 20"
        to="360 20 20"
        dur="1s"
        repeatCount="indefinite"
        />
    </circle>
</svg>